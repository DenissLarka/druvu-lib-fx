# Builds the reactor and publishes druvu-lib-fx (framework + parent pom) to GitHub Packages when a
# GitHub release is created. Uses the automatic GITHUB_TOKEN (no extra secret needed). The example
# module is deploy-skipped, so only com.druvu:druvu-lib-fx and the parent pom are published.
#
# JDK 25 with JavaFX bundled (Azul Zulu 'jdk+fx'): the library resolves javafx.* from the JDK and has
# no org.openjfx dependencies. The build runs under xvfb because the tests start the real JavaFX
# toolkit (Platform.startup) and need a virtual display; xvfb is preinstalled on ubuntu-latest.

name: Maven GitHub Publish

on:
  release:
    types: [created]
  workflow_dispatch: # allow a manual run against an existing tag

jobs:
  release:

    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v6

      - name: Set up JDK 25 (Zulu, JavaFX bundled)
        uses: actions/setup-java@v5
        with:
          java-version: '25'
          distribution: 'zulu'
          java-package: 'jdk+fx'
          server-id: github # matches distributionManagement/repository/id in pom.xml
          settings-path: ${{ github.workspace }} # location for the settings.xml file

      - name: Publish to GitHub Packages
        run: xvfb-run -a mvn -B deploy -s $GITHUB_WORKSPACE/settings.xml
        env:
          GITHUB_TOKEN: ${{ github.token }}
